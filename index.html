<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Captain Eli - The Lily Adventure</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Pirata+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>

<!-- LOADING SCREEN -->

<div id="loadingScreen">

    <div class="loading-content">

        <h1>THE LILY</h1>

        <p>An Original Pirate Adventure</p>

        <div class="loading-bar">
            <div id="loadingProgress"></div>
        </div>

        <span id="loadingText">
            Preparing the voyage...
        </span>

    </div>

</div>


<!-- GAME -->

<div id="game">


    <!-- INTRO SCENE -->

    <section id="introScene" class="scene active">


        <!-- BACKGROUND LAYERS -->

        <img class="sky"
        src="assets/backgrounds/sky.png">

        <img class="ocean"
        src="assets/backgrounds/ocean.png">


        <div class="stars"></div>

        <div class="fog"></div>


        <!-- SHIP -->

        <img id="lilyShip"
        src="assets/ship/lily.png"
        alt="The Lily Pirate Ship">


        <!-- TITLE -->

        <div class="titleBox">

            <h1>
                THE LILY
            </h1>


            <h2>
                An Original Pirate Adventure
            </h2>


            <p>
                Created for Captain Eli
            </p>


            <button id="startButton">
                ⚓ Begin Adventure
            </button>


        </div>


    </section>




    <!-- HARBOR SCENE (NEXT CHAPTER) -->

    <section id="harborScene" class="scene">


        <img class="background"
        src="assets/backgrounds/harbor.png">


        <div class="harborMessage">

            <h1>
                The Harbor of The Lily
            </h1>

            <p>
                A new adventure begins...
            </p>


            <button id="meetCrewButton">
                Meet the Crew
            </button>

        </div>


    </section>




    <!-- FUTURE SCENES -->

    <section id="crewScene" class="scene">
    </section>


    <section id="islandScene" class="scene">
    </section>


    <section id="treasureScene" class="scene">
    </section>


    <section id="letterScene" class="scene">
    </section>



</div>



<script src="script.js"></script>

</body>

</html>
